<!DOCTYPE html>
<html>
<head>
<title>Claim Certificate</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>
/* ===== INPUT STYLING ===== */
form input {
    width: 100%;
    padding: 14px 16px;
    border-radius: 12px;
    border: 1px solid #334155;
    background: rgba(30,41,59,0.8);
    color: #f1f5f9;
    font-size: 1rem;
    outline: none;
    margin-top: 15px;
    transition: 0.3s;
}

/* Focus */
form input:focus {
    border-color: #38bdf8;
    box-shadow: 0 0 0 3px rgba(56,189,248,0.2);
}

/* Heading */
h2 {
    color: #f1f5f9;
    font-weight: 700;
    margin-bottom: 15px;
}

/* Button */
.back-button {
    display: inline-block;
    margin-top: 15px;
    padding: 10px 28px;
    border-radius: 30px;
    background: linear-gradient(135deg, #16a34a, #22c55e);
    color: white;
    text-decoration: none;
    font-weight: 600;
    border: none;
    transition: 0.3s;
    cursor: pointer;
}

/* Hover */
.back-button:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(34,197,94,0.5);
}

/* Container Fix */
.result-card {
    max-width: 420px;
    width: 100%;
    text-align: center;
}

/* Placeholder style */
input::placeholder {
    color: #94a3b8;
}
</style>

</head>

<body class="result-bg">

<div class="result-container">
<div class="result-card">

<h2>Claim Your Certificate</h2>

<form action="/send_otp" method="POST">
<input type="text" name="phone" placeholder="Enter Registered Phone (+91XXXXXXXXXX)" required>
<button type="submit" class="back-button mt-3">Send OTP</button>
</form>

</div>
</div>

</body>
</html>
