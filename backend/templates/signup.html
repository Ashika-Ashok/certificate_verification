<!DOCTYPE html>
<html>
<head>

<title>Signup</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:#020617;

}

/* animated gradient glow */

body::before{

content:"";
position:absolute;
width:100%;
height:100%;

background:radial-gradient(circle at 30% 40%,rgba(0,255,255,0.15),transparent 40%),
radial-gradient(circle at 70% 60%,rgba(139,92,246,0.15),transparent 40%);

animation:glowMove 10s infinite alternate;

}

@keyframes glowMove{

0%{
transform:translateY(-20px);
}

100%{
transform:translateY(20px);
}

}

.card{

width:380px;
padding:40px;

background:rgba(10,15,40,0.7);

border-radius:15px;

backdrop-filter:blur(20px);

border:1px solid rgba(0,255,255,0.4);

box-shadow:

0 0 15px #00ffff,
0 0 35px rgba(139,92,246,0.5);

color:white;

}

h2{

text-align:center;
margin-bottom:25px;

color:#00ffff;

}

input{

width:100%;
padding:12px;
margin:10px 0;

background:rgba(255,255,255,0.05);

border:1px solid rgba(0,255,255,0.3);

border-radius:8px;

color:white;

}

input:focus{

border-color:#8b5cf6;

box-shadow:

0 0 10px #00ffff,
0 0 20px #8b5cf6;

}

button{

width:100%;
padding:12px;

border:none;
border-radius:8px;

background:linear-gradient(135deg,#8b5cf6,#00ffff);

color:black;
font-weight:600;

cursor:pointer;

transition:0.3s;

}

button:hover{

transform:scale(1.05);

box-shadow:

0 0 20px #00ffff,
0 0 30px #8b5cf6;

}

</style>

</head>

<body>

<div class="card">

<h2>Create Blockchain Account</h2>

<form method="POST">

<input type="text" name="username" placeholder="Username">

<input type="email" name="email" placeholder="Email">

<input type="password" name="password" placeholder="Password">

<button type="submit">Signup</button>

</form>

</div>

</body>
</html>
